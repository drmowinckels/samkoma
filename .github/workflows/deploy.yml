name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One npm-workspaces monorepo: a single root `npm ci` installs every package and
# links @samkoma/core, so all jobs install at the root and target a workspace
# with `-w`.
jobs:
  format:
    name: Format (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run format:check

  test-core:
    name: Test core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w @samkoma/core
      - run: npm run test -w @samkoma/core

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w samkoma-api
      - run: npm run test -w samkoma-api

  test-web:
    name: Test & build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # The committed web/public/openapi.json is generated from the API spec.
      # Regenerate and fail if it drifted from the zod source of truth.
      - run: npm run gen:openapi
      - run: git diff --exit-code web/public/openapi.json
      - run: npm run test -w samkoma-web
      - run: npm run build -w samkoma-web

  test-cli:
    name: Test & build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w samkoma-cli
      - run: npm run test -w samkoma-cli
      - run: npm run build -w samkoma-cli

  test-client:
    name: Test & build client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w samkoma-client
      - run: npm run test -w samkoma-client
      - run: npm run build -w samkoma-client

  # Deploys are skipped until the one-time setup is done (see README):
  # CLOUDFLARE_* secrets for the API, and the VITE_API_BASE variable for web.
  deploy-api:
    name: Deploy API (Cloudflare)
    needs: [test-core, test-api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Apply D1 migrations and deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: api
        run: |
          npx wrangler d1 migrations apply samkoma --remote
          npx wrangler deploy
      - name: Skipped notice
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "::notice::Skipping API deploy — set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets to enable."

  deploy-web:
    name: Deploy web (GitHub Pages)
    needs: [test-core, test-web]
    if: ${{ github.ref == 'refs/heads/main' && vars.VITE_API_BASE != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build -w samkoma-web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deploy
        uses: actions/deploy-pages@v4
