name = "gather-api"
main = "src/index.ts"
compatibility_date = "2025-02-04"

# Production config (this file = the deployed state). For local `wrangler dev`,
# values are overridden by `.dev.vars`; tests override them in vitest.config.ts.
# ALLOWED_ORIGINS is a comma-separated allowlist for CORS.
[vars]
ALLOWED_ORIGINS = "https://gather.drmowinckels.io"
WEB_BASE_URL = "https://gather.drmowinckels.io"

[[d1_databases]]
binding = "DB"
database_name = "gather"
database_id = "cb6ccb98-b67d-4087-9398-4afc97b11a21"
migrations_dir = "migrations"
