name = "samkoma-api"
main = "src/index.ts"
compatibility_date = "2025-02-04"

# Production config (this file = the deployed state). For local `wrangler dev`,
# values are overridden by `.dev.vars`; tests override them in vitest.config.ts.
# ALLOWED_ORIGINS is a comma-separated allowlist for CORS.
[vars]
ALLOWED_ORIGINS = "https://samkoma.org"
WEB_BASE_URL = "https://samkoma.org"
CREATE_LIMIT = "30"      # max poll creations per IP per minute
SUBMIT_LIMIT = "120"     # max slot submissions per IP per minute
MAX_RESPONSES = "1000"   # max distinct respondents per poll

# api.samkoma.org is a Cloudflare Worker custom domain managed out-of-band
# (the CI deploy token is Workers + D1 only, so it can't bind custom domains) —
# same as the previous api.samkoma.drmowinckels.io. `wrangler deploy` here only
# updates the script, vars and D1; the hostname + edge cert already exist.

[[d1_databases]]
binding = "DB"
database_name = "samkoma"
database_id = "a9868339-bdf0-4557-b286-75482dbc6298"
migrations_dir = "migrations"

# Daily cleanup of expired polls (03:17 UTC).
[triggers]
crons = ["17 3 * * *"]
